<!DOCTYPE html>
<html lang="ko" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>QuizPi</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <div class="login-logo">π</div>
      <h1 class="app-title" id="login-title">PiDEX Quiz</h1>
      <p class="app-sub" id="login-sub">Test your DEX knowledge &amp; earn your rank</p>
      <button id="btn-login" class="btn-login-main">Start Quiz</button>
      <p id="login-note" class="login-note">Requires Pi Browser</p>
      <p id="login-error" class="login-error-msg" style="display:none;"></p>
    </div>
  </div>

  <!-- 앱 화면 -->
  <div id="app-screen" class="screen hidden">
    <header class="app-header">
      <div class="header-row1">
        <div class="header-status" id="header-status">
          <span id="header-lives" class="header-lives">❤️❤️</span>
          <span id="header-score" class="header-score">0점</span>
        </div>
        <span class="header-title" id="header-title">QuizPi π</span>
        <span id="header-username" class="header-user">-</span>
      </div>
      <div class="header-row2">
        <button class="btn-header-action" id="btn-help">❓ Help</button>
        <button class="btn-header-action" id="btn-intro-overlay">🔗 Pi Hub</button>
        <div class="lang-picker-wrap">
          <button class="btn-lang-picker" id="btn-lang"></button>
          <div class="lang-dropdown" id="lang-dropdown"></div>
        </div>
      </div>
    </header>

    <main class="page-container">
      <div id="page-quiz"     class="page"></div>
      <div id="page-survival" class="page hidden"></div>
      <div id="page-tracker"  class="page hidden"></div>
      <div id="page-opinion"  class="page hidden"></div>
      <div id="page-rank"     class="page hidden"></div>
      <div id="page-stats"    class="page hidden"></div>
      <div id="page-survey"   class="page hidden"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-tab active" data-page="quiz">
        <span class="nav-icon">🧩</span>
        <span class="nav-label" id="nav-label-quiz">퀴즈</span>
      </button>
      <button class="nav-tab" data-page="survival">
        <span class="nav-icon">🌿</span>
        <span class="nav-label" id="nav-label-survival">생존</span>
      </button>
      <button class="nav-tab" data-page="tracker">
        <span class="nav-icon">🔍</span>
        <span class="nav-label" id="nav-label-tracker">트래커</span>
      </button>
      <button class="nav-tab" data-page="survey">
        <span class="nav-icon">📋</span>
        <span class="nav-label" id="nav-label-survey">설문</span>
      </button>
      <button class="nav-tab" id="btn-more-tab">
        <span class="nav-icon">☰</span>
        <span class="nav-label" id="nav-label-more">더보기</span>
      </button>
    </nav>
  </div>

  <!-- 유틸모음 오버레이 -->
  <div id="utils-overlay" class="utils-overlay hidden">
    <div class="utils-panel" id="utils-panel"></div>
  </div>

  <!-- 더보기 시트 -->
  <div id="more-sheet" class="more-sheet hidden">
    <div class="more-sheet-bg" id="more-sheet-bg"></div>
    <div class="more-sheet-panel">
      <div class="more-sheet-grip"></div>
      <button class="more-sheet-item" data-page="rank">
        <span class="more-item-icon">🏆</span>
        <span class="more-item-label" id="more-label-rank">랭킹</span>
      </button>
      <button class="more-sheet-item" data-page="stats">
        <span class="more-item-icon">📊</span>
        <span class="more-item-label" id="more-label-stats">통계</span>
      </button>
      <button class="more-sheet-item" data-page="opinion">
        <span class="more-item-icon">💬</span>
        <span class="more-item-label" id="more-label-opinion">의견</span>
      </button>
    </div>
  </div>

  <script>
    window.addEventListener('error', function(e) {
      var el = document.getElementById('login-error');
      if (el) { el.textContent = '⚠️ ' + (e.message || e.type) + (e.filename ? ' @ ' + e.filename.split('/').pop() + ':' + e.lineno : ''); el.style.display = 'block'; }
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('login-error');
      if (el) { el.textContent = '⚠️ ' + (e.reason?.message || String(e.reason)); el.style.display = 'block'; }
    });
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
